name: Build Desktop & Mobile Apps

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Sync Capacitor
        run: npx cap sync

      - name: Build Android APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Build Electron App
        run: npm run electron:build

      - name: Build Windows Installer
        run: npm run electron:installer

      - name: Prepare Release Assets
        shell: bash
        run: |
          mkdir -p release-assets
          cp android/app/build/outputs/apk/debug/app-debug.apk release-assets/gokul-cycle-tyres.apk
          cp dist-installer/GokulCycleTyresSetup.exe release-assets/GokulCycleTyresSetup.exe

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release-assets/gokul-cycle-tyres.apk
            release-assets/GokulCycleTyresSetup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

