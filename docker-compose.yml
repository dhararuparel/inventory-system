version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: store_inventory_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: inventory_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: .
    container_name: store_inventory_app
    restart: always
    ports:
      - "5000:5000"
    environment:
      - SECRET_KEY=prod-secret-key-98213!#@
      - DATABASE_URL=postgresql://postgres:password123@db:5432/inventory_db
    depends_on:
      - db
    volumes:
      - upload_data:/app/app/static/uploads/products

volumes:
  pgdata:
  upload_data:
